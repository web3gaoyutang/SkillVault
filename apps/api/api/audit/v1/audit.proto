syntax = "proto3";
package audit.v1;

option go_package = "github.com/skillvault/api/api/audit/v1;auditv1";

service AuditService {
  rpc ListAuditLogs(ListAuditLogsRequest) returns (ListAuditLogsReply);
}

message ListAuditLogsRequest {
  uint64 org_id = 1;
  string action = 2;
  string resource_type = 3;
  int32 page = 4;
  int32 page_size = 5;
}

message AuditLogEntry {
  uint64 id = 1;
  uint64 user_id = 2;
  uint64 org_id = 3;
  string action = 4;
  string resource_type = 5;
  uint64 resource_id = 6;
  string ip = 7;
  string created_at = 8;
}

message ListAuditLogsReply {
  repeated AuditLogEntry items = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}
